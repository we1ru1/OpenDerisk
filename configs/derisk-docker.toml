# ============================================================
# OpenDerisk Docker Deployment Configuration
# ============================================================
# This config is optimized for Docker container deployment.
# Environment variables are injected via docker-compose .env file.
# ============================================================

[system]
language = "${env:DERISK_LANG:-en}"
api_keys = []
encrypt_key = "${env:ENCRYPT_KEY:-your_secret_key_change_in_production}"

# Server Configurations
[service.web]
host = "0.0.0.0"
port = 7777
enable_mcp_gateway = "True"
main_app_code = "ai_sre"

[service.web.database]
type = "${env:DB_TYPE:-sqlite}"
path = "pilot/meta_data/derisk.db"
# MySQL settings (used when type = "mysql")
# host = "${env:LOCAL_DB_HOST:-db}"
# port = "${env:LOCAL_DB_PORT:-3306}"
# user = "${env:LOCAL_DB_USER:-root}"
# password = "${env:LOCAL_DB_PASSWORD:-aa123456}"
# name = "${env:LOCAL_DB_NAME:-derisk}"

# RAG Storage
[rag.storage]
[rag.storage.vector]
type = "chroma"
persist_path = "pilot/data"

# Model Configurations
[models]

# --- Primary LLM ---
[[models.llms]]
name = "${env:LLM_MODEL_NAME:-gpt-4o}"
provider = "${env:LLM_MODEL_PROVIDER:-proxy/openai}"
api_base = "${env:OPENAI_API_BASE:-https://api.openai.com/v1}"
api_key = "${env:OPENAI_API_KEY}"

# --- Primary Embedding Model ---
[[models.embeddings]]
name = "${env:EMBEDDING_MODEL_NAME:-text-embedding-3-small}"
provider = "${env:EMBEDDING_MODEL_PROVIDER:-proxy/openai}"
api_url = "${env:EMBEDDING_MODEL_API_URL:-https://api.openai.com/v1/embeddings}"
api_key = "${env:OPENAI_API_KEY}"
