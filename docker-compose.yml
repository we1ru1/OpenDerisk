# ============================================================
# OpenDerisk Docker Compose - Full Stack Deployment
# ============================================================
#
# Usage:
#   1. Copy .env.template to .env and configure:
#        cp .env.template .env
#
#   2. Start all services:
#        docker compose up -d
#
#   3. Start with MySQL (instead of SQLite):
#        DB_TYPE=mysql docker compose --profile mysql up -d
#
#   4. View logs:
#        docker compose logs -f backend
#
#   5. Stop:
#        docker compose down
#
# ============================================================

services:
  # --------------------------------------------------------
  # Backend API Server (Python/FastAPI)
  # --------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: derisk-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DERISK_CONFIG_FILE=${DERISK_CONFIG_FILE:-configs/derisk-docker.toml}
      - DB_TYPE=${DB_TYPE:-sqlite}
      - LOCAL_DB_HOST=${LOCAL_DB_HOST:-db}
      - LOCAL_DB_PORT=${LOCAL_DB_PORT:-3306}
      - LOCAL_DB_USER=${LOCAL_DB_USER:-root}
      - LOCAL_DB_PASSWORD=${LOCAL_DB_PASSWORD:-aa123456}
      - LOCAL_DB_NAME=${LOCAL_DB_NAME:-derisk}
    ports:
      - "${WEB_SERVER_PORT:-7777}:7777"
    volumes:
      # Persist SQLite database
      - derisk-metadata:/app/pilot/meta_data
      # Persist ChromaDB vector storage
      - derisk-vectordata:/app/pilot/data
      # Persist message data
      - derisk-messages:/app/pilot/message
      # Persist logs
      - derisk-logs:/app/logs
      # Mount custom configs (optional)
      # - ./configs:/app/configs:ro
    networks:
      - derisknet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # --------------------------------------------------------
  # Frontend Web UI (Next.js + nginx)
  # --------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        # This determines the backend URL the frontend calls
        # For docker-compose, use the nginx proxy path
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:7777}
    container_name: derisk-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - derisknet

  # --------------------------------------------------------
  # MySQL Database (optional, activate with --profile mysql)
  # --------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: derisk-mysql
    profiles:
      - mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-aa123456}
      MYSQL_DATABASE: ${LOCAL_DB_NAME:-derisk}
      MYSQL_USER: ${LOCAL_DB_USER:-derisk}
      MYSQL_PASSWORD: ${LOCAL_DB_PASSWORD:-aa123456}
    ports:
      - "${LOCAL_DB_PORT:-3306}:3306"
    volumes:
      - derisk-mysql-data:/var/lib/mysql
      - ./assets/schema/derisk.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-aa123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - derisknet

# --------------------------------------------------------
# Named Volumes
# --------------------------------------------------------
volumes:
  derisk-metadata:
    driver: local
  derisk-vectordata:
    driver: local
  derisk-messages:
    driver: local
  derisk-logs:
    driver: local
  derisk-mysql-data:
    driver: local

# --------------------------------------------------------
# Network
# --------------------------------------------------------
networks:
  derisknet:
    driver: bridge
    name: derisknet
